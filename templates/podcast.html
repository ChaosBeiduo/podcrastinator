{% extends "base.html" %}
{% block content %}
<nav aria-label="breadcrumb">
  <ul>
    <li><a href="/">Dashboard 返回仪表盘</a></li>
    <li>{{ podcast.title }}</li>
  </ul>
</nav>

<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; margin-top: 1rem;">
    <div>
        <h2 style="margin-bottom: 0px;">{{ podcast.title }}</h2>
        <p style="margin-bottom: 0px; color: var(--pico-muted-color);">管理本地缓存与上传执行进度</p>
    </div>
    
    <!-- 引入 HTMX 特性：不跳转的情况下刷新元数据 -->
    <button hx-post="/api/podcast/{{ podcast.id }}/sync" 
            hx-target="#sync-status" 
            hx-indicator="#sync-spinner"
            class="contrast"
            style="width: 200px;">
        🔄 立即抓取最新源列表
    </button>
</div>

<!-- 用于显示同步结果与动画占位 -->
<div id="sync-spinner" class="htmx-indicator" aria-busy="true">正在解析远端分集...</div>
<div id="sync-status" style="margin-bottom: 2rem;"></div>

<figure>
    <table role="grid">
        <thead>
            <tr>
                <th scope="col" width="35%">章节名称与描述</th>
                <th scope="col" width="15%">发布时间</th>
                <th scope="col" width="20%">处理状态进程</th>
                <th scope="col" width="30%">调度操作</th>
            </tr>
        </thead>
        <tbody>
            {% for ep in episodes %}
                {% include 'components/episode_row.html' %}
            {% else %}
                <tr>
                    <td colspan="4" style="text-align: center; padding: 2rem;">本地没有找到该播客的分集索引。请点击右上角【抓取最新源列表】按钮同步。</td>
                </tr>
            {% endfor %}
        </tbody>
    </table>
</figure>
{% endblock %}
